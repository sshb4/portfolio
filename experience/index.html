<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Redirecting...</title>
	<link rel="canonical" href="/" />
	<script>
		try {
			sessionStorage.setItem('homeScrollTarget', 'timeline');
			window.location.replace('/');
		} catch (error) {
			window.location.replace('/?scroll=timeline');
		}
	</script>
	<noscript>
		<meta http-equiv="refresh" content="0; url=/?scroll=timeline" />
	</noscript>
</head>
<body>
	<p>Redirecting to <a href="/?scroll=timeline">/</a>...</p>
</body>
</html>
